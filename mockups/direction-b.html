<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wayFin — Direction B · Block Party</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF1F2;
    --rose:#E11D48;
    --rose-soft:#FB7185;
    --blue:#2563EB;
    --ink:#881337;
    --border:#FECDD3;
    --card:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#e6d9da;
    display:flex;justify-content:center;align-items:center;
    font-family:'Nunito',sans-serif;
  }
  .phone{
    width:390px;height:844px;position:relative;overflow:hidden;
    background:var(--bg);color:var(--ink);
  }
  /* floating geometric confetti */
  .confetti i{position:absolute;display:block;animation:float 6s ease-in-out infinite}
  .confetti .tri{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:15px solid var(--rose-soft);opacity:.5}
  .confetti .sq{width:13px;height:13px;background:var(--blue);opacity:.35;border-radius:3px}
  .confetti .dot{width:10px;height:10px;background:var(--rose);opacity:.4;border-radius:50%}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-14px) rotate(12deg)}}

  .topbar{
    display:flex;justify-content:center;padding-top:52px;
    animation:pop .7s .1s cubic-bezier(.3,1.4,.5,1) both;
  }
  .badge{
    background:var(--card);border:2.5px solid var(--ink);border-radius:999px;
    font-size:11px;font-weight:800;letter-spacing:.2em;padding:8px 18px;
    box-shadow:3px 3px 0 var(--ink);
  }
  .wordmark{
    text-align:center;margin-top:18px;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:62px;color:var(--rose);
    text-shadow:3px 3px 0 var(--ink);
    animation:pop .8s .25s cubic-bezier(.3,1.4,.5,1) both;
  }
  .wordmark span{color:var(--blue)}
  .tagline{
    text-align:center;font-size:14.5px;font-weight:700;margin-top:6px;
    animation:pop .8s .4s cubic-bezier(.3,1.4,.5,1) both;
  }
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

  /* walker block */
  .stage{
    margin:20px auto 0;width:330px;height:250px;position:relative;
    background:var(--card);
    border:3px solid var(--ink);border-radius:24px;
    box-shadow:6px 6px 0 var(--rose-soft);
    animation:pop .8s .55s cubic-bezier(.3,1.4,.5,1) both;
    overflow:hidden;
  }
  .stage .floor-tag{
    position:absolute;top:12px;left:12px;background:var(--blue);color:#fff;
    font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;
    padding:5px 12px;border-radius:999px;border:2px solid var(--ink);
  }
  .stage .off{
    position:absolute;top:12px;right:12px;background:var(--rose);color:#fff;
    font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;
    padding:6px 12px;border-radius:12px;border:2px solid var(--ink);
    transform:rotate(6deg);
    animation:wiggle 3s 1.4s ease-in-out infinite;
  }
  @keyframes wiggle{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-4deg)}}
  .walker{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%)}
  .walker polygon{opacity:0;animation:facet .5s cubic-bezier(.3,1.4,.5,1) forwards}
  @keyframes facet{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .dashline{stroke:var(--blue);stroke-width:2.5;stroke-dasharray:1 9;stroke-linecap:round;fill:none;opacity:.8;
    animation:dash 2s 1.2s ease-out both}
  @keyframes dash{from{stroke-dashoffset:200;opacity:0}to{stroke-dashoffset:0;opacity:.8}}

  /* chat sheet */
  .sheet{
    position:absolute;left:12px;right:12px;bottom:12px;height:368px;
    background:var(--card);
    border:3px solid var(--ink);border-radius:26px;
    box-shadow:0 -6px 0 var(--rose);
    padding:18px 16px;
    animation:sheetUp .9s .8s cubic-bezier(.3,1.2,.4,1) both;
    display:flex;flex-direction:column;gap:12px;
  }
  @keyframes sheetUp{from{transform:translateY(115%)}to{transform:translateY(0)}}
  .sheet-head{display:flex;align-items:center;gap:10px}
  .bot-face{
    width:38px;height:38px;flex:0 0 38px;border-radius:13px;
    background:var(--rose);border:2.5px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    box-shadow:2.5px 2.5px 0 var(--ink);
  }
  .sheet-head .name{font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px}
  .sheet-head .status{font-size:10.5px;font-weight:800;color:var(--blue);letter-spacing:.15em}
  .bubble{
    background:var(--bg);border:2.5px solid var(--border);
    border-radius:4px 16px 16px 16px;
    padding:12px 14px;font-size:13.5px;line-height:1.5;font-weight:600;
    animation:pop .5s 1.35s both;
  }
  .bubble b{color:var(--rose)}
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:9px;animation:pop .5s 1.55s both}
  .chip{
    background:var(--card);border:2.5px solid var(--ink);border-radius:14px;
    box-shadow:3px 3px 0 var(--border);
    padding:12px 11px;font-size:12.5px;font-weight:800;
    display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;
  }
  .chip:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--border)}
  .chip svg{flex:0 0 16px}
  .chip.hot{grid-column:span 2;background:var(--rose);color:#fff;box-shadow:3px 3px 0 var(--ink)}
  .field{
    margin-top:auto;display:flex;align-items:center;gap:10px;
    border:2.5px solid var(--border);border-radius:16px;padding:12px 14px;
    font-size:12.5px;font-weight:700;color:#c98a97;
    animation:pop .5s 1.75s both;
  }
  .field .send{margin-left:auto;color:var(--blue)}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s!important;animation-delay:0s!important}
  }
</style>
</head>
<body>
<div class="phone">
  <div class="confetti">
    <i class="tri" style="top:9%;left:8%"></i>
    <i class="sq" style="top:14%;left:84%;animation-delay:1s"></i>
    <i class="dot" style="top:24%;left:14%;animation-delay:2s"></i>
    <i class="tri" style="top:20%;left:70%;animation-delay:.6s;transform:rotate(40deg)"></i>
    <i class="dot" style="top:6%;left:55%;animation-delay:1.4s"></i>
  </div>

  <div class="topbar"><div class="badge">ORION MALL · BRIGADE GATEWAY</div></div>
  <h1 class="wordmark">way<span>Fin</span></h1>
  <p class="tagline">Never get lost. Never overpay.</p>

  <div class="stage">
    <div class="floor-tag">GROUND FLOOR</div>
    <div class="off">LEVI'S −50%</div>
    <svg style="position:absolute;top:70px;left:15px" width="300" height="60" viewBox="0 0 300 60">
      <path class="dashline" d="M10,50 C90,10 210,55 290,20"/>
      <circle cx="290" cy="20" r="6" fill="#2563EB" stroke="#881337" stroke-width="2.5"/>
    </svg>
    <!-- duotone faceted walker -->
    <svg class="walker" width="200" height="185" viewBox="0 0 200 232">
      <polygon points="95,20 115,25 108,45" fill="#E11D48" style="animation-delay:.9s"/>
      <polygon points="95,20 108,45 88,42" fill="#FB7185" style="animation-delay:.96s"/>
      <polygon points="95,20 88,42 80,30" fill="#2563EB" style="animation-delay:1.02s"/>
      <polygon points="98,45 108,45 103,56" fill="#881337" style="animation-delay:1.06s"/>
      <polygon points="85,60 115,55 105,100" fill="#2563EB" style="animation-delay:1.1s"/>
      <polygon points="85,60 105,100 80,105" fill="#FB7185" style="animation-delay:1.16s"/>
      <polygon points="115,55 120,95 105,100" fill="#E11D48" style="animation-delay:1.22s"/>
      <polygon points="80,105 105,100 95,140" fill="#E11D48" style="animation-delay:1.28s"/>
      <polygon points="105,100 120,95 112,135" fill="#FB7185" style="animation-delay:1.32s"/>
      <polygon points="95,140 105,100 112,135" fill="#2563EB" style="animation-delay:1.36s"/>
      <polygon points="88,62 96,63 84,95" fill="#1d4fbd" style="animation-delay:1.4s"/>
      <polygon points="112,60 122,62 118,86" fill="#FB7185" style="animation-delay:1.44s"/>
      <polygon points="118,86 126,84 124,110" fill="#E11D48" style="animation-delay:1.48s"/>
      <polygon points="116,112 138,112 134,148" fill="#2563EB" style="animation-delay:1.54s"/>
      <polygon points="116,112 134,148 112,146" fill="#1d4fbd" style="animation-delay:1.58s"/>
      <polygon points="95,140 112,135 125,175" fill="#FB7185" style="animation-delay:1.62s"/>
      <polygon points="118,168 128,172 136,206" fill="#2563EB" style="animation-delay:1.66s"/>
      <polygon points="128,200 148,207 130,213" fill="#E11D48" style="animation-delay:1.7s"/>
      <polygon points="95,140 106,142 78,180" fill="#E11D48" style="animation-delay:1.68s"/>
      <polygon points="78,180 88,182 70,216" fill="#FB7185" style="animation-delay:1.72s"/>
      <polygon points="56,213 76,216 70,223" fill="#2563EB" style="animation-delay:1.76s"/>
    </svg>
  </div>

  <div class="sheet">
    <div class="sheet-head">
      <div class="bot-face">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="5" y="7" width="14" height="12" rx="3"/><circle cx="10" cy="13" r="1" fill="#fff"/><circle cx="14" cy="13" r="1" fill="#fff"/><path d="M12 7V4"/></svg>
      </div>
      <div>
        <div class="name">wayFin</div>
        <div class="status">ONLINE · G FLOOR</div>
      </div>
    </div>
    <div class="bubble">Heyy! 👋 You just walked in at <b>Mall Entry 2</b>. What's the mission?</div>
    <div class="chips">
      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E11D48" stroke-width="2.5"><path d="M9 20l-5.5-2.5v-13L9 7m0 13l6-3m-6 3V7m6 10l5.5 2.5v-13L15 4m0 13V4M9 7l6-3"/></svg>
        Explore stores
      </div>
      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a6 6 0 0 1 12 0v2M16 11l2 2 4-4"/></svg>
        Find a friend
      </div>
      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E11D48" stroke-width="2.5"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/></svg>
        Scan a price
      </div>
      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5"><path d="M5 17h14M6 17l1.5-6h9L18 17M9 11V8a3 3 0 0 1 6 0v3"/><circle cx="7.5" cy="19" r="1.5"/><circle cx="16.5" cy="19" r="1.5"/></svg>
        Save my parking
      </div>
      <div class="chip hot">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 2l2.4 7.2H22l-6 4.6 2.3 7.2-6.3-4.5-6.3 4.5L8 13.8 2 9.2h7.6z"/></svg>
        Tonight's top drops — LEVI'S 50% off
      </div>
    </div>
    <div class="field">Ask wayFin anything…<span class="send">➤</span></div>
  </div>
</div>
</body>
</html>
